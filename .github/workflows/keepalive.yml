name: Neon Keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Neon databases
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET_KEY }}" \
            "https://noxintel.vercel.app/api/cron/keepalive"
